<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🧷 Changing Table Finder</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui, sans-serif; background: #f5f3ef; min-height: 100vh; }
.header { background: white; padding: 18px 16px 14px; border-bottom: 1px solid #eee; position: sticky; top: 0; z-index: 10; }
.header h1 { font-size: 19px; font-weight: 700; }
.header p { font-size: 12px; color: #999; margin-top: 2px; }
.main { padding: 16px; max-width: 500px; margin: 0 auto; }
.card { background: white; border-radius: 14px; padding: 16px; margin-bottom: 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
.label { font-size: 11px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: #bbb; margin-bottom: 10px; display: block; }
.search-row { display: flex; gap: 8px; }
input[type=text] { flex: 1; padding: 12px 14px; border: 1.5px solid #e8e8e8; border-radius: 10px; font-size: 15px; font-family: inherit; outline: none; background: #fafafa; }
input[type=text]:focus { border-color: #1a1a1a; background: white; }
.search-btn { padding: 12px 16px; background: #1a1a1a; color: white; border: none; border-radius: 10px; font-size: 15px; cursor: pointer; }
.gps-btn { width: 100%; padding: 11px; background: white; border: 1.5px solid #e8e8e8; border-radius: 10px; font-size: 14px; color: #555; cursor: pointer; font-family: inherit; margin-top: 8px; }
.gps-btn:active { background: #f5f3ef; }
.radius-row { display: flex; gap: 8px; }
.r-btn { flex: 1; padding: 9px 4px; border: 1.5px solid #e8e8e8; background: white; color: #555; border-radius: 8px; cursor: pointer; font-size: 13px; font-family: inherit; }
.r-btn.active { border-color: #1a1a1a; background: #1a1a1a; color: white; }
.count-label { font-size: 12px; color: #aaa; margin-bottom: 10px; }
.count-label b { color: #1a1a1a; font-size: 15px; }
.w-card { background: white; border-radius: 12px; padding: 14px 16px; margin-bottom: 10px; box-shadow: 0 1px 4px rgba(0,0,0,0.05); display: flex; align-items: flex-start; gap: 12px; }
.w-icon { font-size: 22px; margin-top: 1px; flex-shrink: 0; }
.w-body { flex: 1; min-width: 0; }
.w-name { font-weight: 600; font-size: 15px; color: #1a1a1a; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.w-addr { font-size: 12px; color: #999; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.w-tags { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 6px; }
.tag { font-size: 11px; background: #f0f0f0; color: #777; border-radius: 5px; padding: 2px 7px; }
.tag.green { background: #e6f4ea; color: #3a8; }
.tag.orange { background: #fff3e0; color: #c80; }
.tag.blue { background: #e8f0fe; color: #46a; }
.w-dist { font-size: 13px; color: #bbb; white-space: nowrap; flex-shrink: 0; }
.maps-btn { display: block; width: 100%; margin-top: 10px; padding: 8px; background: #f5f3ef; border: none; border-radius: 8px; font-size: 13px; color: #555; cursor: pointer; font-family: inherit; text-align: center; text-decoration: none; }
.loading { text-align: center; padding: 32px; color: #aaa; font-size: 14px; }
.empty { text-align: center; padding: 40px 20px; color: #bbb; font-size: 14px; }
.error-msg { background: white; border-radius: 14px; padding: 16px; color: #c44; margin-bottom: 12px; font-size: 14px; }
.loading-dots { display: inline-flex; gap: 4px; }
.loading-dots span { width: 7px; height: 7px; background: #ccc; border-radius: 50%; animation: bounce 1.2s infinite; }
.loading-dots span:nth-child(2) { animation-delay: .2s; }
.loading-dots span:nth-child(3) { animation-delay: .4s; }
@keyframes bounce { 0%,80%,100%{transform:scale(0.7);opacity:.5} 40%{transform:scale(1);opacity:1} }
</style>
</head>
<body>

<div class="header">
  <h1>🧷 Changing Table Finder</h1>
  <p id="header-sub">Find changing tables near you</p>
</div>

<div class="main">

  <div class="card">
    <span class="label">Where are you?</span>
    <div class="search-row">
      <input type="text" id="search" placeholder="e.g. Central Park, New York" />
      <button class="search-btn" onclick="searchLocation()">🔍</button>
    </div>
    <button class="gps-btn" onclick="getGPS()">📍 Use my current location</button>
  </div>

  <div id="radius-card" class="card" style="display:none">
    <span class="label">Search radius</span>
    <div class="radius-row">
      <button class="r-btn" onclick="setRadius(500,this)">500m</button>
      <button class="r-btn active" onclick="setRadius(1000,this)">1 km</button>
      <button class="r-btn" onclick="setRadius(2000,this)">2 km</button>
      <button class="r-btn" onclick="setRadius(5000,this)">5 km</button>
    </div>
  </div>

  <div id="results"></div>
</div>

<script>
var userLat = null, userLon = null, radius = 1000;

function typeIcon(tags) {
  var map = {cafe:'☕',restaurant:'🍽️',toilets:'🚻',library:'📚',chemist:'💊',supermarket:'🛒',department_store:'🏬',fast_food:'🍔',pharmacy:'💊'};
  return map[tags.amenity||tags.shop||''] || '📍';
}
function typeLabel(tags) {
  var map = {cafe:'Café',restaurant:'Restaurant',toilets:'Restroom',library:'Library',chemist:'Drugstore',supermarket:'Supermarket',department_store:'Department Store',fast_food:'Fast Food',pharmacy:'Pharmacy'};
  return map[tags.amenity||tags.shop||''] || tags.amenity || tags.shop || 'Place';
}
function haversine(lat1,lon1,lat2,lon2) {
  var R=6371, dLat=(lat2-lat1)*Math.PI/180, dLon=(lon2-lon1)*Math.PI/180;
  var a=Math.sin(dLat/2)*Math.sin(dLat/2)+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)*Math.sin(dLon/2);
  return Math.round(R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a))*1000);
}
function distLabel(m) { return m < 1000 ? m+'m' : (m/1000).toFixed(1)+'km'; }

function setRadius(r, btn) {
  radius = r;
  document.querySelectorAll('.r-btn').forEach(function(b){ b.classList.remove('active'); });
  btn.classList.add('active');
  if(userLat) loadTables();
}

function setCoords(lat, lon, label) {
  userLat = lat; userLon = lon;
  document.getElementById('header-sub').textContent = label;
  document.getElementById('radius-card').style.display = 'block';
  loadTables();
}

function searchLocation() {
  var q = document.getElementById('search').value.trim();
  if(!q) return;
  document.getElementById('results').innerHTML = '<div class="loading"><div class="loading-dots"><span></span><span></span><span></span></div><div style="margin-top:10px;color:#aaa">Finding location…</div></div>';
  fetch('https://nominatim.openstreetmap.org/search?q='+encodeURIComponent(q)+'&format=json&limit=1',{headers:{'Accept-Language':'en'}})
  .then(function(r){return r.json();})
  .then(function(data){
    if(!data.length){ document.getElementById('results').innerHTML='<div class="error-msg">Location not found. Try being more specific.</div>'; return; }
    var name = data[0].display_name.split(',').slice(0,2).join(', ');
    setCoords(parseFloat(data[0].lat), parseFloat(data[0].lon), name);
  })
  .catch(function(){ document.getElementById('results').innerHTML='<div class="error-msg">Search failed. Please try again.</div>'; });
}

function getGPS() {
  if(!navigator.geolocation){ alert('GPS not available'); return; }
  document.getElementById('results').innerHTML = '<div class="loading"><div class="loading-dots"><span></span><span></span><span></span></div><div style="margin-top:10px;color:#aaa">Getting your location…</div></div>';
  navigator.geolocation.getCurrentPosition(
    function(pos){ setCoords(pos.coords.latitude, pos.coords.longitude, 'Your location'); },
    function(){ document.getElementById('results').innerHTML='<div class="error-msg">GPS denied. Please type your location above.</div>'; }
  );
}

function loadTables() {
  document.getElementById('results').innerHTML = '<div class="loading"><div class="loading-dots"><span></span><span></span><span></span></div><div style="margin-top:10px;color:#aaa">Finding changing tables…</div></div>';
  var q='[out:json];(node["changing_table"="yes"](around:'+radius+','+userLat+','+userLon+');way["changing_table"="yes"](around:'+radius+','+userLat+','+userLon+'););out body;';
  var url='https://overpass-api.de/api/interpreter?data='+encodeURIComponent(q);
  fetch(url)
  .then(function(r){return r.json();})
  .then(render)
  .catch(function(){
    fetch('https://corsproxy.io/?'+encodeURIComponent(url))
    .then(function(r){return r.json();})
    .then(render)
    .catch(function(){ document.getElementById('results').innerHTML='<div class="error-msg">Failed to load data. Please try again.</div>'; });
  });
}

function render(data) {
  var items = (data.elements||[])
    .filter(function(e){return e.lat||e.center;})
    .map(function(e){
      var la=e.lat||(e.center&&e.center.lat), lo=e.lon||(e.center&&e.center.lon);
      return Object.assign({},e,{dist:haversine(userLat,userLon,la,lo),elat:la,elon:lo});
    })
    .sort(function(a,b){return a.dist-b.dist;});

  document.getElementById('header-sub').textContent = items.length+' changing tables found';

  if(!items.length){
    document.getElementById('results').innerHTML='<div class="empty">😕 No changing tables found nearby.<br><br>Try a larger radius.</div>';
    return;
  }

  var html='<div class="count-label"><b>'+items.length+'</b> changing tables nearby</div>';
  items.forEach(function(item){
    var t=item.tags||{};
    var addr=[t['addr:street'],t['addr:housenumber']].filter(Boolean).join(' ');
    var ctLoc=t['changing_table:location'];
    var fee=t['changing_table:fee']==='yes'||t['fee']==='yes';
    var hours=t['opening_hours'];
    var mapsUrl='https://maps.google.com/?q='+item.elat+','+item.elon;
    html+='<div class="w-card">'+
      '<div class="w-icon">'+typeIcon(t)+'</div>'+
      '<div class="w-body">'+
        '<div class="w-name">'+(t.name||'Unnamed')+'</div>'+
        (addr?'<div class="w-addr">'+addr+'</div>':'')+
        '<div class="w-tags">'+
          '<span class="tag">'+typeLabel(t)+'</span>'+
          (ctLoc?'<span class="tag green">📍 '+ctLoc+'</span>':'')+
          (fee?'<span class="tag orange">💰 Paid</span>':'')+
          (hours?'<span class="tag blue">🕐 '+hours.split(';')[0]+'</span>':'')+
        '</div>'+
        '<a href="'+mapsUrl+'" target="_blank" class="maps-btn">Open in Google Maps →</a>'+
      '</div>'+
      '<div class="w-dist">'+distLabel(item.dist)+'</div>'+
    '</div>';
  });
  document.getElementById('results').innerHTML=html;
}

document.getElementById('search').addEventListener('keydown',function(e){if(e.key==='Enter')searchLocation();});
</script>

</body>
</html>
