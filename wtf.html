<!DOCTYPE html>

<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🧷 Wickeltisch Finder</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui, sans-serif; background: #f5f3ef; min-height: 100vh; }

.header { background: white; padding: 18px 16px 14px; border-bottom: 1px solid #eee; position: sticky; top: 0; z-index: 10; }
.header h1 { font-size: 19px; font-weight: 700; }
.header p { font-size: 12px; color: #999; margin-top: 2px; }

.main { padding: 16px; max-width: 500px; margin: 0 auto; }

.status-card { background: white; border-radius: 14px; padding: 20px 16px; margin-bottom: 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); text-align: center; }
.status-icon { font-size: 36px; margin-bottom: 8px; }
.status-text { font-size: 15px; color: #333; font-weight: 500; }
.status-sub { font-size: 13px; color: #aaa; margin-top: 4px; }

.retry-btn { margin-top: 14px; padding: 10px 24px; background: #1a1a1a; color: white; border: none; border-radius: 10px; font-size: 14px; cursor: pointer; font-family: inherit; }

.radius-row { display: flex; gap: 8px; margin-bottom: 16px; }
.r-btn { flex: 1; padding: 9px 4px; border: 1.5px solid #e8e8e8; background: white; color: #555; border-radius: 8px; cursor: pointer; font-size: 13px; font-family: inherit; }
.r-btn.active { border-color: #1a1a1a; background: #1a1a1a; color: white; }

.count-label { font-size: 12px; color: #aaa; margin-bottom: 10px; letter-spacing: 0.04em; }
.count-label b { color: #1a1a1a; font-size: 15px; }

.w-card { background: white; border-radius: 12px; padding: 14px 16px; margin-bottom: 10px; box-shadow: 0 1px 4px rgba(0,0,0,0.05); display: flex; align-items: flex-start; gap: 12px; }
.w-icon { font-size: 22px; margin-top: 1px; flex-shrink: 0; }
.w-body { flex: 1; min-width: 0; }
.w-name { font-weight: 600; font-size: 15px; color: #1a1a1a; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.w-addr { font-size: 12px; color: #999; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.w-tags { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 6px; }
.tag { font-size: 11px; background: #f0f0f0; color: #777; border-radius: 5px; padding: 2px 7px; }
.tag.green { background: #e6f4ea; color: #3a8; }
.tag.orange { background: #fff3e0; color: #c80; }
.tag.blue { background: #e8f0fe; color: #46a; }
.w-dist { font-size: 13px; color: #bbb; white-space: nowrap; flex-shrink: 0; font-variant-numeric: tabular-nums; }

.maps-btn { display: block; width: 100%; margin-top: 10px; padding: 8px; background: #f5f3ef; border: none; border-radius: 8px; font-size: 13px; color: #555; cursor: pointer; font-family: inherit; text-align: center; }
.maps-btn:active { background: #e8e6e2; }

.empty { text-align: center; padding: 40px 20px; color: #bbb; font-size: 14px; }

.loading-dots { display: inline-flex; gap: 4px; }
.loading-dots span { width: 6px; height: 6px; background: #ccc; border-radius: 50%; animation: bounce 1.2s infinite; }
.loading-dots span:nth-child(2) { animation-delay: .2s; }
.loading-dots span:nth-child(3) { animation-delay: .4s; }
@keyframes bounce { 0%,80%,100%{transform:scale(0.7);opacity:.5} 40%{transform:scale(1);opacity:1} }
</style>

</head>
<body>

<div class="header">
  <h1>🧷 Wickeltisch Finder</h1>
  <p id="header-sub">Wickelmöglichkeiten in deiner Nähe</p>
</div>

<div class="main">
  <div id="status-card" class="status-card">
    <div class="status-icon">📍</div>
    <div class="status-text">Standort wird ermittelt…</div>
    <div class="status-sub">Bitte GPS-Zugriff erlauben</div>
  </div>

  <div id="radius-row" class="radius-row" style="display:none">
    <button class="r-btn" onclick="setRadius(500,this)">500m</button>
    <button class="r-btn active" onclick="setRadius(1000,this)">1 km</button>
    <button class="r-btn" onclick="setRadius(2000,this)">2 km</button>
    <button class="r-btn" onclick="setRadius(5000,this)">5 km</button>
  </div>

  <div id="results"></div>
</div>

<script>
var userLat = null, userLon = null, radius = 1000;

function typeIcon(tags) {
  var t = tags.amenity || tags.shop || '';
  var map = {cafe:'☕',restaurant:'🍽️',toilets:'🚻',library:'📚',chemist:'💊',supermarket:'🛒',department_store:'🏬',fast_food:'🍔',pharmacy:'💊'};
  return map[t] || '📍';
}
function typeLabel(tags) {
  var t = tags.amenity || tags.shop || '';
  var map = {cafe:'Café',restaurant:'Restaurant',toilets:'WC',library:'Bibliothek',chemist:'Drogerie',supermarket:'Supermarkt',department_store:'Kaufhaus',fast_food:'Fast Food',pharmacy:'Apotheke'};
  return map[t] || t || 'Ort';
}

function haversine(lat1,lon1,lat2,lon2) {
  var R=6371, dLat=(lat2-lat1)*Math.PI/180, dLon=(lon2-lon1)*Math.PI/180;
  var a=Math.sin(dLat/2)*Math.sin(dLat/2)+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)*Math.sin(dLon/2);
  return Math.round(R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a))*1000);
}

function distLabel(m) {
  return m < 1000 ? m + ' m' : (m/1000).toFixed(1) + ' km';
}

function setRadius(r, btn) {
  radius = r;
  document.querySelectorAll('.r-btn').forEach(function(b){ b.classList.remove('active'); });
  btn.classList.add('active');
  if(userLat) loadTables();
}

function showStatus(icon, text, sub, showRetry) {
  document.getElementById('status-card').style.display = 'block';
  document.getElementById('status-card').innerHTML =
    '<div class="status-icon">'+icon+'</div>' +
    '<div class="status-text">'+text+'</div>' +
    (sub ? '<div class="status-sub">'+sub+'</div>' : '') +
    (showRetry ? '<button class="retry-btn" onclick="getLocation()">Nochmal versuchen</button>' : '');
}

function getLocation() {
  showStatus('📍', 'Standort wird ermittelt…', 'Bitte GPS-Zugriff erlauben', false);
  document.getElementById('results').innerHTML = '';
  document.getElementById('radius-row').style.display = 'none';

  if(!navigator.geolocation) {
    showStatus('❌', 'GPS nicht verfügbar', 'Dein Browser unterstützt kein GPS', false);
    return;
  }

  navigator.geolocation.getCurrentPosition(
    function(pos) {
      userLat = pos.coords.latitude;
      userLon = pos.coords.longitude;
      document.getElementById('status-card').style.display = 'none';
      document.getElementById('radius-row').style.display = 'flex';
      loadTables();
    },
    function(err) {
      var msg = err.code === 1 ? 'GPS-Zugriff verweigert' : 'Standort konnte nicht ermittelt werden';
      showStatus('❌', msg, 'Bitte Standortzugriff in den Browser-Einstellungen erlauben', true);
    },
    { enableHighAccuracy: true, timeout: 10000 }
  );
}

function loadTables() {
  document.getElementById('results').innerHTML =
    '<div class="status-card" style="margin-bottom:0"><div class="loading-dots"><span></span><span></span><span></span></div><div class="status-sub" style="margin-top:10px">Suche Wickeltische…</div></div>';

  var q = '[out:json];(node["changing_table"="yes"](around:'+radius+','+userLat+','+userLon+');way["changing_table"="yes"](around:'+radius+','+userLat+','+userLon+'););out body;';

  fetch('https://overpass-api.de/api/interpreter?data='+encodeURIComponent(q))
  .then(function(r){ return r.json(); })
  .then(function(data) { render(data.elements || []); })
  .catch(function() {
    // Try CORS proxy
    var url = 'https://overpass-api.de/api/interpreter?data='+encodeURIComponent(q);
    return fetch('https://corsproxy.io/?'+encodeURIComponent(url))
      .then(function(r){ return r.json(); })
      .then(function(data){ render(data.elements || []); })
      .catch(function(){ render([]); });
  });
}

function render(elements) {
  var items = elements
    .filter(function(e){ return e.lat || e.center; })
    .map(function(e){
      var elat = e.lat || (e.center && e.center.lat);
      var elon = e.lon || (e.center && e.center.lon);
      return Object.assign({}, e, { dist: haversine(userLat, userLon, elat, elon), elat: elat, elon: elon });
    })
    .sort(function(a,b){ return a.dist - b.dist; });

  document.getElementById('header-sub').textContent = items.length + ' Wickeltische im Umkreis';

  if(!items.length) {
    document.getElementById('results').innerHTML = '<div class="empty">😕 Keine Wickeltische im gewählten Umkreis gefunden.<br><br>Versuche einen größeren Radius.</div>';
    return;
  }

  var html = '<div class="count-label"><b>'+items.length+'</b> Wickeltische gefunden</div>';

  items.forEach(function(item) {
    var t = item.tags || {};
    var name = t.name || 'Unbenannt';
    var addr = [t['addr:street'], t['addr:housenumber']].filter(Boolean).join(' ');
    var ctLoc = t['changing_table:location'];
    var fee = t['changing_table:fee'] === 'yes' || t['fee'] === 'yes';
    var hours = t['opening_hours'];
    var mapsUrl = 'https://maps.google.com/?q='+item.elat+','+item.elon;

    html += '<div class="w-card">' +
      '<div class="w-icon">'+typeIcon(t)+'</div>' +
      '<div class="w-body">' +
        '<div class="w-name">'+name+'</div>' +
        (addr ? '<div class="w-addr">'+addr+'</div>' : '') +
        '<div class="w-tags">' +
          '<span class="tag">'+typeLabel(t)+'</span>' +
          (ctLoc ? '<span class="tag green">📍 '+ctLoc+'</span>' : '') +
          (fee ? '<span class="tag orange">💰 kostenpflichtig</span>' : '') +
          (hours ? '<span class="tag blue">🕐 '+hours.split(';')[0]+'</span>' : '') +
        '</div>' +
        '<a href="'+mapsUrl+'" target="_blank" class="maps-btn">In Google Maps öffnen →</a>' +
      '</div>' +
      '<div class="w-dist">'+distLabel(item.dist)+'</div>' +
    '</div>';
  });

  document.getElementById('results').innerHTML = html;
}

getLocation();
</script>

</body>
</html>
